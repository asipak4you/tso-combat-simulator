<html lang="en">

<title>Page not found – The Settlers Online Combat Simulator</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<script>
  // Bekannte alte externe Links auf die Basis-URL umleiten (Query/Hash übernehmen).
  // Erkennt z.B. /dso_kampfsimulator in beliebiger Schreibweise und mit Unterpfaden.
  (function () {
    var legacy = /^\/dso[_-]?kampfsimulator(\/|$)/i;
    if (legacy.test(location.pathname)) {
      location.replace("https://settlersonlinesimulator.com/" + location.search + location.hash);
    }
  })();
</script>
